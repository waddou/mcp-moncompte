name: Publish to MCP Registry

# Republie le serveur au registre officiel MCP quand server.json change
# (typiquement un bump de "version"). Authentification GitHub OIDC : aucun secret requis.
# Déclenchable aussi manuellement.
on:
  push:
    branches: [main]
    paths: ["server.json"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # requis pour l'auth OIDC du publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer mcp-publisher
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Authentification (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publier server.json
        run: ./mcp-publisher publish
